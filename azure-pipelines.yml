# ─────────────────────────────────────────────────────────────────────────────
# Azure Pipelines – EWA Backend CI/CD
#
# Trigger: push to main (or release/*) branch
# Pipeline steps:
#   1. Build & test Spring Boot backend (Maven)
#   2. Build Docker image (multi-stage Dockerfile in EWA_Backend/)
#   3. Push image to Docker Hub
#   4. Deploy to Oracle VM over SSH
#
# Required Azure DevOps Variable Group: "ewa-secrets"
#   DOCKER_HUB_USERNAME   – Docker Hub username
#   DOCKER_HUB_TOKEN      – Docker Hub access token (mark as secret)
#   SSH_USER              – VM login user (e.g. ubuntu or opc)
#   SSH_HOST              – VM public IP or hostname
#   SSH_PRIVATE_KEY       – PEM private key content (mark as secret)
#   DEPLOY_DIR            – Deployment path on VM (e.g. /opt/ewa)
#   SPRING_DATASOURCE_URL – Neon PostgreSQL JDBC URL (mark as secret)
#   SPRING_DATASOURCE_USERNAME – DB username (mark as secret)
#   SPRING_DATASOURCE_PASSWORD – DB password (mark as secret)
#   JWT_SECRET            – JWT signing secret (mark as secret)
# ─────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - release/*

# Only run pipeline for backend changes (or pipeline YAML itself)
paths:
  include:
    - EWA_Backend/**
    - azure-pipelines.yml

# Exclude mobile-only changes from triggering backend pipeline
paths:
  exclude:
    - EWA_Frontend/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: ewa-secrets           # Variable group defined in Azure DevOps
  - name: IMAGE_NAME
    value: $(DOCKER_HUB_USERNAME)/ewa-backend
  - name: IMAGE_TAG
    value: $(Build.BuildId)-$(Build.SourceVersion:0:7)
  - name: BACKEND_DIR
    value: EWA_Backend

stages:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: Build & Test
# ─────────────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: "Build & Test Backend"
  jobs:
  - job: MavenBuild
    displayName: "Maven build + unit tests"
    steps:

    - task: JavaToolInstaller@0
      displayName: "Use Java 17"
      inputs:
        versionSpec: "17"
        jdkArchitectureOption: x64
        jdkSourceOption: PreInstalled

    - bash: |
        cd $(BACKEND_DIR)
        chmod +x mvnw
        ./mvnw verify -B --no-transfer-progress
      displayName: "mvnw verify (compile + test)"

    - task: PublishTestResults@2
      displayName: "Publish test results"
      condition: always()
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: "**/surefire-reports/TEST-*.xml"
        searchFolder: $(BACKEND_DIR)

    - task: PublishBuildArtifacts@1
      displayName: "Publish JAR artifact"
      inputs:
        pathToPublish: "$(BACKEND_DIR)/target"
        artifactName: ewa-jar

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: Docker Build & Push
# ─────────────────────────────────────────────────────────────────────────────
- stage: Docker
  displayName: "Docker Build & Push"
  dependsOn: Build
  jobs:
  - job: DockerBuildPush
    displayName: "Build image and push to Docker Hub"
    steps:

    - task: JavaToolInstaller@0
      displayName: "Use Java 17"
      inputs:
        versionSpec: "17"
        jdkArchitectureOption: x64
        jdkSourceOption: PreInstalled

    - bash: |
        echo "$(DOCKER_HUB_TOKEN)" | docker login --username "$(DOCKER_HUB_USERNAME)" --password-stdin
      displayName: "Docker Hub login"

    - bash: |
        cd $(BACKEND_DIR)
        docker build \
          --tag "$(IMAGE_NAME):$(IMAGE_TAG)" \
          --tag "$(IMAGE_NAME):latest" \
          .
      displayName: "Build Docker image"

    - bash: |
        docker push "$(IMAGE_NAME):$(IMAGE_TAG)"
        docker push "$(IMAGE_NAME):latest"
      displayName: "Push image to Docker Hub"

    - bash: |
        docker logout
      displayName: "Docker logout"
      condition: always()

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3: Deploy to Oracle VM
# ─────────────────────────────────────────────────────────────────────────────
- stage: Deploy
  displayName: "Deploy to Oracle VM"
  dependsOn: Docker
  jobs:
  - deployment: DeployToVM
    displayName: "SSH deploy to Oracle VM"
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:

          # Write SSH private key to disk
          - bash: |
              mkdir -p ~/.ssh
              echo "$(SSH_PRIVATE_KEY)" > ~/.ssh/ewa_deploy_key
              chmod 600 ~/.ssh/ewa_deploy_key
              ssh-keyscan -H "$(SSH_HOST)" >> ~/.ssh/known_hosts
            displayName: "Set up SSH credentials"

          # Upload compose file to VM
          - bash: |
              scp -i ~/.ssh/ewa_deploy_key -o StrictHostKeyChecking=no \
                "$(BACKEND_DIR)/docker-compose.prod.yml" \
                "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_DIR)/docker-compose.prod.yml"
              scp -i ~/.ssh/ewa_deploy_key -o StrictHostKeyChecking=no \
                "$(BACKEND_DIR)/deploy.sh" \
                "$(SSH_USER)@$(SSH_HOST):$(DEPLOY_DIR)/deploy.sh"
            displayName: "Upload compose and deploy script"

          # Remote deploy (env vars injected via SSH, not printed in logs)
          - bash: |
              ssh -i ~/.ssh/ewa_deploy_key -o StrictHostKeyChecking=no \
                "$(SSH_USER)@$(SSH_HOST)" \
                bash -s << 'ENDSSH'
                  set -euo pipefail
                  export DOCKER_HUB_USERNAME="$(DOCKER_HUB_USERNAME)"
                  export DOCKER_HUB_TOKEN="$(DOCKER_HUB_TOKEN)"
                  export IMAGE_TAG="$(IMAGE_TAG)"
                  export DEPLOY_DIR="$(DEPLOY_DIR)"
                  chmod +x "$(DEPLOY_DIR)/deploy.sh"
                  bash "$(DEPLOY_DIR)/deploy.sh"
              ENDSSH
            displayName: "Remote: pull & restart ewa-backend"
            env:
              # Pass secrets as env vars so they are masked in pipeline logs
              DOCKER_HUB_TOKEN: $(DOCKER_HUB_TOKEN)
              SSH_PRIVATE_KEY: $(SSH_PRIVATE_KEY)

          # Cleanup SSH key
          - bash: |
              rm -f ~/.ssh/ewa_deploy_key
            displayName: "Remove SSH key"
            condition: always()
